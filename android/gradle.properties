# AndroidX migration — required since AGP 8.x.
android.useAndroidX=true

# JVM heap for the Gradle daemon.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use the configuration cache (AGP 8+ supports it; cuts second-build time).
org.gradle.configuration-cache=true
org.gradle.caching=true

# Don't try to upload any analytics.
android.experimental.suppressLintWarning=true
